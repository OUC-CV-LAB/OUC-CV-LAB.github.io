<div class="home-publications-list" style="max-width: 100%; margin: auto; text-align:center;">
    <h3 style="font-size:2.5rem; font-weight:800; margin-bottom:8px;">学术论文</h3>

    <p style="font-size:22px; color:#666; margin-bottom:28px;">
        * 通讯作者 &nbsp;&nbsp; # 共同一作
    </p>

    {% assign count = 0 %}
    {% for publi in site.data.publist limit:8 %}
        {% if publi.highlight == 1 %}
            {% assign count = count | plus: 1 %}
            {% if count <= 9 %}
                <div class="row home-publication-item" style="max-width: 100%;padding: 0 10px; margin: auto;">
                    <div class="col-sm-12">
                        <p>
                            <a class="pub1" style="font-size: 20px; line-height:1.8; text-decoration: none; color: inherit; font-weight:700;">
                                &#8226; {{ publi.brief }}
                            </a>
                        </p>
                    </div>
                </div>
            {% endif %}
        {% endif %}
    {% endfor %}

    <div class="home-more-link" style="text-align: center; margin: 10px auto 0 auto; width: 100%; height: 80px">
        <a href="{{ site.url }}{{ site.baseurl }}/publications" 
           style="text-decoration: none; font-weight: bold; color: white !important;
           background: linear-gradient(135deg, #1e3c72, #4a90e2);
           border-radius: 25px; box-shadow: 0 4px 15px rgba(30, 60, 114, 0.3);
           display: inline-block;
           height: 60px;
           width: 300px;
           line-height: 50px;font-size: 2.5rem;">
            更多...
        </a>
    </div>
</div>
